<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anmelden | Secure FileBridge</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
        <p class="eyebrow">Secure FileBridge</p>
        <h1 id="login-title">Anmelden</h1>
        <p class="muted">Zugriff nur fuer berechtigte Benutzer im internen Netzwerk.</p>

        <div class="alert error" th:if="${param.error}">Benutzername oder Passwort ist falsch.</div>
        <form th:action="@{/login}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Benutzername
                <input name="username" autocomplete="username" required autofocus>
            </label>
            <label>
                Passwort
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button type="submit" class="primary full">Einloggen</button>
        </form>
    </section>
</main>
</body>
</html>
