server {
    listen 80;
    server_name YOUR_DOMAIN_OR_HOSTNAME;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name filebridge.BlockHoster.rfh-lab.de;

    ssl_certificate /etc/letsencrypt/live/filebridge.BlockHoster.rfh-lab.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/filebridge.BlockHoster.rfh-lab.de/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1024m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        limit_except GET POST HEAD {
            deny all;
        }
    }

}
